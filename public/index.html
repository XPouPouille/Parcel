<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parcel Tracker</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">📦</span>
        <span class="logo-text">Parcel</span>
      </div>
      <div class="header-actions">
        <button id="refresh-all-btn" class="btn btn-ghost" title="Actualiser tous les colis">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <button id="config-btn" class="btn btn-ghost" title="Paramètres">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button id="theme-toggle" class="btn btn-ghost" title="Changer le thème">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <!-- Add tracking form -->
    <section class="add-section">
      <form id="add-form" class="add-form">
        <!-- Row 1 : numéro + libellé -->
        <div class="form-row">
          <input
            id="tracking-input"
            type="text"
            placeholder="Numéro de suivi (ex: 6C02270228001)..."
            class="input"
            autocomplete="off"
            spellcheck="false"
          />
          <input
            id="label-input"
            type="text"
            placeholder="Libellé (optionnel)"
            class="input input-label"
          />
        </div>

        <!-- Row 2 : choix du transporteur + bouton ajouter -->
        <div class="form-row form-row-carrier">
          <!-- Toggle auto / manuel -->
          <div class="carrier-toggle">
            <button type="button" id="carrier-auto-btn" class="carrier-toggle-btn active">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              Détection auto
            </button>
            <button type="button" id="carrier-manual-btn" class="carrier-toggle-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
              Je connais le transporteur
            </button>
          </div>

          <!-- Dropdown transporteur (masqué par défaut) -->
          <div id="carrier-select-wrapper" class="carrier-select-wrapper hidden">
            <select id="carrier-select" class="input carrier-select">
              <option value="">— Choisir un transporteur —</option>
            </select>
          </div>

          <!-- Code postal (Mondial Relay uniquement) -->
          <div id="postal-code-wrapper" class="postal-code-wrapper hidden">
            <input
              id="postal-code-input"
              type="text"
              placeholder="Code postal destinataire"
              class="input"
              maxlength="10"
              autocomplete="postal-code"
            />
          </div>

          <button type="submit" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Ajouter
          </button>
        </div>

        <div id="form-error" class="form-error hidden"></div>
      </form>
    </section>

    <!-- Status bar -->
    <div id="status-bar" class="status-bar hidden">
      <span id="status-in-progress"></span>
      <span class="separator">·</span>
      <span id="status-delivered"></span>
      <span class="separator">·</span>
      <span id="status-interval"></span>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="in-progress">
        En cours
        <span id="badge-in-progress" class="badge hidden">0</span>
      </button>
      <button class="tab-btn" data-tab="completed">
        Terminé
        <span id="badge-completed" class="badge badge-green hidden">0</span>
      </button>
    </div>

    <!-- Tab: In Progress -->
    <div id="tab-in-progress" class="tab-content active">
      <div id="packages-in-progress" class="packages-grid">
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <p>Aucun colis en cours</p>
          <p class="empty-sub">Ajoutez un numéro de suivi pour commencer</p>
        </div>
      </div>
    </div>

    <!-- Tab: Completed -->
    <div id="tab-completed" class="tab-content">
      <div id="packages-completed" class="packages-grid">
        <div class="empty-state">
          <div class="empty-icon">✅</div>
          <p>Aucun colis livré</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Package detail modal -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h2 id="modal-title" class="modal-title"></h2>
          <p id="modal-carrier" class="modal-carrier"></p>
        </div>
        <div class="modal-header-actions">
          <button id="modal-refresh" class="btn btn-ghost btn-sm" title="Actualiser">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
          <button id="modal-close" class="btn btn-ghost btn-sm">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div id="modal-status-badge" class="modal-status-badge"></div>
      <div id="modal-timeline" class="timeline"></div>
      <div class="modal-footer">
        <button id="modal-delete" class="btn btn-danger btn-sm">Supprimer le colis</button>
      </div>
    </div>
  </div>

  <!-- Config modal -->
  <div id="config-modal" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <div>
          <h2 class="modal-title">⚙️ Paramètres</h2>
          <p class="modal-carrier">Fréquence de mise à jour automatique</p>
        </div>
        <button id="config-modal-close" class="btn btn-ghost btn-sm">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="config-body">
        <p class="config-desc">Choisissez la fréquence à laquelle l'application vérifie le statut des colis en cours.</p>

        <div class="config-unit-row">
          <label class="config-unit-label">
            <input type="radio" name="interval-unit" value="minutes" id="unit-minutes" />
            <span>Minutes</span>
          </label>
          <label class="config-unit-label">
            <input type="radio" name="interval-unit" value="heures" id="unit-heures" />
            <span>Heures</span>
          </label>
        </div>

        <div class="config-input-row">
          <input id="interval-value" type="number" min="1" max="168" class="input" placeholder="ex: 60" />
          <span id="interval-unit-label" class="config-unit-suffix">minutes</span>
        </div>

        <div id="config-preview" class="config-preview"></div>
        <div id="config-error" class="form-error hidden"></div>
      </div>

      <div class="modal-footer config-footer">
        <button id="config-save" class="btn btn-primary">Enregistrer</button>
        <button id="config-cancel" class="btn btn-ghost">Annuler</button>
      </div>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <p>Recherche du transporteur...</p>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
